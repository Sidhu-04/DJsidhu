{% extends "base.html" %}

{% block title %}Confirm Delete | Sidhu CMS{% endblock %}

{% block cc %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-lg p-5 text-center">
            <div class="mb-4">
                <div class="p-3 bg-danger bg-opacity-10 rounded-circle d-inline-flex mb-3">
                    <span class="fs-2">🗑️</span>
                </div>
                <h4 class="fw-bold text-danger mb-2">Delete Student?</h4>
                <p class="text-muted">This action is <strong>permanent</strong> and cannot be undone. Are you sure you want to remove this student record?</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-3 justify-content-center">
                    <button type="submit" class="btn btn-danger px-5 shadow">Yes, Delete</button>
                    <a href="{% url 'student-list' %}" class="btn btn-outline-secondary px-5">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

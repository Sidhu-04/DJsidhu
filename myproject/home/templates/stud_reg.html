<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Student Registraion</h1>
<form method="post" action="">
    {% csrf_token %}

    <label for="name">First Name:</label>
    <input type="text" id="name" name="fname" required><br><br>

    <label for="name">last Name:</label>
    <input type="text" id="name" name="lname" required><br><br>

    <label for="name">email:</label>
    <input type="email" id="name" name="email" required><br><br>

    <label for="name">phone:</label>
    <input type="number" id="name" name="ph" required><br><br>

    <label for="name">address:</label>
    <input type="text" id="name" name="address" required><br><br>

    <label for="name">username:</label>
    <input type="text" id="name" name="uname" required><br><br>

    <label for="name">password:</label>
    <input type="password" id="name" name="password" required><br><br>
    
    <input type="submit" value="register">


</form>
    
</body>
</html>

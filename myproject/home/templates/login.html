{% extends "base.html" %}

{% block title %}Login | Sidhu CMS{% endblock %}

{% block cc %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card p-4 p-md-5 shadow-lg border-0 bg-white">
            <div class="text-center mb-4">
                <h2 class="fw-bold mb-1">Welcome Back</h2>
                <p class="text-muted small">Please enter your details to sign in</p>
            </div>

            <form action="" method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="username" class="form-label font-weight-bold">Username</label>
                    <input type="text" id="username" name="username" class="form-control form-control-lg border-light bg-light" placeholder="Enter your username" required>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between mb-1">
                        <label for="password" class="form-label font-weight-bold mb-0">Password</label>
                        <a href="#" class="small text-decoration-none">Forgot password?</a>
                    </div>
                    <input type="password" id="password" name="password" class="form-control form-control-lg border-light bg-light" placeholder="••••••••" required>
                </div>
                <div class="mb-4 d-flex align-items-center">
                    <input type="checkbox" id="remember" class="form-check-input me-2">
                    <label for="remember" class="small text-muted">Remember me for 30 days</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg shadow">Sign In</button>
            </form>
            
            <div class="text-center mt-4">
                <p class="small text-muted mb-0">Don't have an account? <a href="#" class="text-primary fw-bold text-decoration-none">Contact Admin</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
